services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: wahabox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Host port for the app (default 3000). Override via HOST_PORT env var if 3000 is taken on the host.
      - "${HOST_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/wahabox?schema=public
      REDIS_URL: redis://redis:6379
      SERVER_MASTER_SECRET: ${SERVER_MASTER_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SES_FROM_ADDRESS: ${SES_FROM_ADDRESS}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      APP_URL: ${APP_URL}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

