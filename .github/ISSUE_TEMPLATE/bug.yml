name: Bug Report
description: File a bug report to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Run '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: It should have...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment (Docker version, Node version, browser)
      description: What environment were you running in?
      placeholder: |
        - Docker: 24.0
        - Node: 20.x
        - Browser: Firefox 120
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here (logs, screenshots, etc.).
      placeholder: Any extra details...
    validations:
      required: false
